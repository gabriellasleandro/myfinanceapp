function buildWeeklyConsSchedule() {
  const out = [];
  let d = new Date(Date.UTC(2026, 0, 5));
  const end = new Date(Date.UTC(2026, 7, 10));
  let idx = 0;
  while (d <= end) {
    const amount = 160.5 + (idx * 1.5);
    const month = d.getUTCMonth() + 1;
    const id = d.toISOString().slice(0,10);
    const dd = String(d.getUTCDate()).padStart(2,'0');
    const mm = String(d.getUTCMonth()+1).padStart(2,'0');
    const yyyy = d.getUTCFullYear();
    out.push({id, month, amount, label:`${dd}/${mm}/${yyyy}`});
    d.setUTCDate(d.getUTCDate() + 7);
    idx++;
  }
  return out;
}

async function supabaseSelect() {
  const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${encodeURIComponent(SUPABASE_ROW_ID)}&select=payload`;
  const res = await fetch(url, {
    method: 'GET',
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
  if (!res.ok) throw new Error(`Supabase read failed: ${res.status}`);
  const rows = await res.json();
  if (!Array.isArray(rows) || rows.length === 0) return null;
  return rows[0]?.payload || null;
}

async function supabaseUpsert(payload) {
  const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=id`;
  const body = [{
    id: SUPABASE_ROW_ID,
    payload,
    updated_at: new Date().toISOString()
  }];
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Supabase write failed: ${res.status}`);
}

// ===== RETRY QUEUE =====
function enqueueRetry(payload) {
  if (!storageOk) return;
  try {
    window.localStorage.setItem(RETRY_QUEUE_KEY, JSON.stringify({
      payload,
      timestamp: Date.now(),
      attempts: 0
    }));
  } catch(e) {}
}

function clearRetryQueue() {
  if (!storageOk) return;
  try { window.localStorage.removeItem(RETRY_QUEUE_KEY); } catch(e) {}
}

function getRetryQueue() {
  if (!storageOk) return null;
  try {
    const raw = window.localStorage.getItem(RETRY_QUEUE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function scheduleRetry() {
  if (retryTimer) return;
  const delays = [5000, 15000, 30000, 60000];

  async function tryRetry() {
    const queued = getRetryQueue();
    if (!queued) { retryTimer = null; return; }

    const attempt = queued.attempts || 0;
    if (attempt >= 4) {
      retryTimer = null;
      showRetryFailed();
      return;
    }

    try {
      await supabaseUpsert(queued.payload);
      cloudOk = true;
      clearRetryQueue();
      retryTimer = null;
      showSaveStatus(true, true);
      showRetrySuccess();
    } catch(e) {
      cloudOk = false;
      queued.attempts = attempt + 1;
      if (storageOk) {
        try { window.localStorage.setItem(RETRY_QUEUE_KEY, JSON.stringify(queued)); } catch(e) {}
      }
      const nextDelay = delays[Math.min(attempt + 1, delays.length - 1)];
      retryTimer = setTimeout(tryRetry, nextDelay);
    }
  }

  retryTimer = setTimeout(tryRetry, delays[0]);
}

function showRetrySuccess() {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.innerHTML = '✅';
  el.title = 'Dados sincronizados com a nuvem (retry OK)';
  el.style.color = '#16a34a';
  el.style.transition = 'transform 0.3s';
  el.style.transform = 'scale(1.4)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 600);
}

function showRetryFailed() {
  const el = document.getElementById('saveStatus');

// ===== LOAD & SAVE =====
async function loadData() {
  storageOk = await testStorage();

  try {
    const cloudPayload = await supabaseSelect();
    cloudOk = true;
    if (cloudPayload) {
      applyPayload(cloudPayload);
      if (storageOk) window.localStorage.setItem(STORAGE_KEY, JSON.stringify(cloudPayload));
      clearRetryQueue();
      return;
    }
  } catch(e) {
    cloudOk = false;
  }

  if (storageOk) {
    try {
      const r = window.localStorage.getItem(STORAGE_KEY);
      if (r) applyPayload(JSON.parse(r));
    } catch(e) {}
  }

  // Se tem dados pendentes na fila, tenta reenviar
  const queued = getRetryQueue();
  if (queued && queued.payload) {
    console.log('[Finance App] Dados pendentes encontrados, tentando reenviar...');
    scheduleRetry();
  }
}

async function saveData() {
  const payload = buildPayload();

  let localSaved = false;
  if (storageOk) {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); localSaved = true; } catch(e) {}
  }

  let cloudSaved = false;
  try {
    await supabaseUpsert(payload);
    cloudSaved = true;
    cloudOk = true;
    clearRetryQueue();
  } catch(e) {
    cloudOk = false;
    enqueueRetry(payload);
    scheduleRetry();
  }

  showSaveStatus(localSaved, cloudSaved);
}

function showSaveStatus(localSaved, cloudSaved) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  if (cloudSaved) {
    el.innerHTML = '✅';
    el.style.color = '#16a34a';
    el.title = 'Nuvem conectada';
  } else if (localSaved) {
    el.innerHTML = '💾';
    el.style.color = '#f59e0b';
    el.title = 'Salvo apenas no aparelho — tentando sincronizar...';
  } else {
    el.innerHTML = '⚠️';
    el.style.color = '#dc2626';
    el.title = 'ERRO: Falha ao salvar. Verifique sua conexão.';
  }
}

function getAllFixed() {
const base = fixedBase.map(f => state.fixedOverrides?.[f.id] ? {…f, …state.fixedOverrides[f.id]} : f);
return […base, …state.customFixed];
}
function fixedPaidCount(m) { return getAllFixed().filter(f=>isPaid(m,f.id)).length; }
function fixedPaidTotal(m) { return getAllFixed().reduce((s,f)=>isPaid(m,f.id)?s+getActual(m,f.id,getFixedBaseValue(m,f)):s,0); }
function fixedPaidTotalCash(m) { return getAllFixed().reduce((s,f)=>isPaid(m,f.id) && f.payment!==‘cartao’?s+getActual(m,f.id,getFixedBaseValue(m,f)):s,0); }
function fixedTotalActual(m) { return getAllFixed().reduce((s,f)=>s+getActual(m,f.id,getFixedBaseValue(m,f)),0); }
function getWeeklyConsMonthItems(m) { return consWeeklySchedule.filter(w => w.month === m); }
function getWeeklyConsMonthBase(m) { return getWeeklyConsMonthItems(m).reduce((s,w)=>s+w.amount,0); }
function getWeeklyConsMonthPaid(m) { return getWeeklyConsMonthItems(m).filter(w=>isWeeklyConsPaid(w.id)).reduce((s,w)=>s+w.amount,0); }
function getConsMonthBase(m) { return (consM[m] || 0) + getWeeklyConsMonthBase(m); }
function getConsMonthPaid(m) { return (isConsPaid(m, ‘m’) ? (consM[m] || 0) : 0) + getWeeklyConsMonthPaid(m); }

function calculateData() {
const data = []; let cum = 0; let invested = 0;
for (let i = 0; i < monthNums.length; i++) {
const m = monthNums[i];
const monthInc = getMonthIncomes(m);
let income, incIsReal = false;
if (monthInc.length > 0) { income = monthInc.reduce((s, inc) => s + getIncomeValue(inc), 0); incIsReal = true; }
else { income = GAB + GABI * gc[m] + (extraIncome[m] || 0); }
let fixedUsed = 0, fixIsReal = false;
for (const f of getAllFixed()) {
const base = getFixedBaseValue(m, f);
if (isPaid(m, f.id)) { fixedUsed += getActual(m, f.id, base); fixIsReal = true; }
else { fixedUsed += base; }
}
const consBase = getConsMonthBase(m);
const consPaid = getConsMonthPaid(m);
fixedUsed += consBase;
if (consPaid > 0) fixIsReal = true;
const cats = getCategories();
let varUsed = 0, varIsReal = false;
for (const c of cats) {
const budget = getCatBudget(c, m);
const spent = catSpent(m, c.id);
const closed = !!state.varClosed[`${m}-${c.id}`];
if (budget <= 0) { varUsed += spent; if (spent > 0) varIsReal = true; }
else if (closed) { varUsed += spent; varIsReal = true; }
else { varUsed += budget; }
}
const instTotal = getInstallmentItems(m).reduce((s, inst) => s + inst.val, 0);
const totalExp = fixedUsed + varUsed;
const net = income - totalExp;
cum += net;
const lock = state.bankLocks?.[m];
const hasLockedValue = lock && typeof lock.value === ‘number’ && !isNaN(lock.value);
if (hasLockedValue) { invested = lock.value; }
else { if (m < 4) invested = cum; else invested = (invested * 1.009) + net; }
data.push({ month:months[i], m, income, fixedUsed, varUsed, inst:instTotal, totalExp, net, cum, invested, incIsReal, fixIsReal, varIsReal, bankLocked: !!lock?.checked });
}
return data;
}

nthBankValue)}</div> </div> </div> ${state.resumoOpenGastosChart ?`
<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:12px">

// ==================== ANALYTICS ====================
function renderAnalytics() {
const m = state.trackMonth, mi = monthNums.indexOf(m);
const cats = getCategories();
const controllable = cats.filter(c=>getCatBudget(c,m)>0);
const legacy = cats.filter(c=>getCatBudget(c,m)<=0);
const mode = state.analyticsTab || ‘mensal’;
const parentDefs = getAnalyticsParentDefs();
const buildParentDetailHtml = (p) => {
const fixedNames = p.fixedCats.map(id => getFixedCatLabel(id)).filter(Boolean);
const varNames = p.varCats.map(id => getCategoryById(id)?.name || null).filter(Boolean);
return `<div style="font-size:10px;color:#475569;line-height:1.35;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:6px;margin-top:4px"><div><strong>Fixas:</strong> ${fixedNames.join(', ') || '—'}</div><div><strong>Variáveis:</strong> ${varNames.join(', ') || '—'}</div></div>`;
};
const computeAnnualData = (monthList) => {
const byParent = Object.fromEntries(parentDefs.map(p=>[p.id,{meta:0,current:0,donut:0}]));
monthList.forEach(mm => {
const monthExp = getMonthExp(mm);
getAllFixed().forEach(f => { const base = getFixedBaseValue(mm, f); if (base <= 0) return; const pid = parentDefs.find(p => p.fixedCats.includes(f.cat || ‘casa’))?.id; if (!pid) return; const actual = getActual(mm, f.id, base); byParent[pid].meta += base; byParent[pid].current += isPaid(mm, f.id) ? actual : 0; byParent[pid].donut += isPaid(mm, f.id) ? actual : base; });
cats.forEach(c => { const pid = parentDefs.find(p => p.varCats.includes(c.id))?.id; if (!pid) return; const budget = getCatBudget(c, mm); const spent = monthExp.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.val,0); const closed = !!state.varClosed[`${mm}-${c.id}`]; byParent[pid].current += spent; if (budget > 0) { byParent[pid].meta += budget; byParent[pid].donut += closed ? spent : budget; } else { byParent[pid].meta += spent; byParent[pid].donut += spent; } });
});
const bars = parentDefs.map(p => ({…p, meta: byParent[p.id].meta, current: byParent[p.id].current, donut: byParent[p.id].donut}));
const donutRows = bars.filter(b=>b.donut>0).sort((a,b)=>b.donut-a.donut);
const mergedTotal = donutRows.reduce((s,r)=>s+r.donut,0);
return {bars, donutRows, mergedTotal};
};
const computeMonthlyData = (mm) => {
const byParent = Object.fromEntries(parentDefs.map(p=>[p.id,0]));
getAllFixed().forEach(f => { const base = getFixedBaseValue(mm, f); if (base <= 0) return; if (!isPaid(mm, f.id)) return; const pid = parentDefs.find(p => p.fixedCats.includes(f.cat || ‘casa’))?.id; if (!pid) return; byParent[pid] += getActual(mm, f.id, base); });
cats.forEach(c => { const pid = parentDefs.find(p => p.varCats.includes(c.id))?.id; if (!pid) return; byParent[pid] += catSpent(mm, c.id); });
const rows = parentDefs.map(p => ({…p, val: byParent[p.id]})).filter(r => r.val > 0).sort((a,b)=>b.val-a.val);
return {rows, total: rows.reduce((s,r)=>s+r.val,0)};
};
const annualData = computeAnnualData(monthNums);
const monthData = computeMonthlyData(m);
const donutColors = [’#3b82f6’,’#22c55e’,’#f59e0b’,’#ef4444’,’#a855f7’,’#06b6d4’,’#f97316’,’#84cc16’];
const paintDonut = (rows, total, valField) => {
let pctAcc = 0;
const out = rows.map((row, idx) => { const val = row[valField]; const pct = total ? (val / total) * 100 : 0; const startPct = pctAcc; const endPct = idx === rows.length - 1 ? 100 : Math.min(100, pctAcc + pct); pctAcc = endPct; return {…row, pct, color: donutColors[idx % donutColors.length], startPct, endPct}; });
const gradient = out.length ? `conic-gradient(${out.map(r=>`${r.color} ${r.startPct}% ${r.endPct}%`).join(',')})` : ‘conic-gradient(#e2e8f0 0% 100%)’;
return {rows: out, gradient};
};
const tabsHtml = `<div style="display:flex;gap:8px;overflow-x:auto;white-space:nowrap;margin:0 0 12px"><button onclick="changeAnalyticsTab('mensal')" style="border:1px solid ${mode==='mensal'?'#2563eb':'#cbd5e1'};background:${mode==='mensal'?'#dbeafe':'#f1f5f9'};color:${mode==='mensal'?'#1d4ed8':'#475569'};font-weight:700;border-radius:10px;padding:8px 12px;cursor:pointer;flex:0 0 auto">Mensal</button><button onclick="changeAnalyticsTab('anual')" style="border:1px solid ${mode==='anual'?'#2563eb':'#cbd5e1'};background:${mode==='anual'?'#dbeafe':'#f1f5f9'};color:${mode==='anual'?'#1d4ed8':'#475569'};font-weight:700;border-radius:10px;padding:8px 12px;cursor:pointer;flex:0 0 auto">Anual</button></div>`;
const getPctColor = (pctRaw) => pctRaw > 100 ? ‘#dc2626’ : pctRaw > 80 ? ‘#f59e0b’ : ‘#3b82f6’;
if (mode === ‘anual’) {
const donutPack = paintDonut(annualData.donutRows, annualData.mergedTotal, ‘donut’);
const monthGuides = monthNums.map((mm, idx) => ({month: months[idx], pct: ((idx + 1) / monthNums.length) * 100, active: mm === m}));
let annualIncomePlanned = 0, annualIncomeCurrent = 0;
monthNums.forEach(mm => { const monthInc = getMonthIncomes(mm); if (monthInc.length > 0) { annualIncomePlanned += monthInc.reduce((s, inc) => s + getIncomeValue(inc), 0); annualIncomeCurrent += monthInc.reduce((s, inc) => s + (inc.received ? getIncomeValue(inc) : 0), 0); } else { annualIncomePlanned += (GAB + GABI * gc[mm] + (extraIncome[mm] || 0)); } });
const annualIncomePctRaw = annualIncomePlanned > 0 ? (annualIncomeCurrent / annualIncomePlanned) * 100 : 0;
const annualIncomePct = Math.min(annualIncomePctRaw, 100);
const annualIncomeColor = getPctColor(annualIncomePctRaw);
const fixedSubRows = getFixedCategories().map(fc => { let planned = 0, current = 0; monthNums.forEach(mm => { getAllFixed().filter(f => (f.cat || ‘casa’) === fc.id).forEach(f => { const base = getFixedBaseValue(mm, f); if (base <= 0) return; planned += base; if (isPaid(mm, f.id)) current += getActual(mm, f.id, base); }); }); return {id: fc.id, label: fc.name, planned, current}; }).filter(r => r.planned > 0 || r.current > 0).sort((a,b)=>Math.max(b.current,b.planned)-Math.max(a.current,a.planned));
const varSubRows = getCategories().map(c => { let planned = 0, current = 0; monthNums.forEach(mm => { const budget = getCatBudget(c, mm); const spent = catSpent(mm, c.id); current += spent; planned += budget > 0 ? budget : spent; }); return {id: c.id, label: c.name, planned, current, hasCap: (c.budget || 0) > 0}; }).filter(r => r.planned > 0 || r.current > 0 || r.id === ‘casamento’);
const controllableIds = varSubRows.filter(r=>r.hasCap).map(r=>r.id);
const noCapIds = varSubRows.filter(r=>!r.hasCap).map(r=>r.id);
const preferredControlOrder = [‘alimentacao’,‘eventos’,‘extras’,‘educacao’,‘gasolina_v’,‘limpeza’,‘conforto’,‘formula_v’];
const orderedControl = […preferredControlOrder.filter(id => controllableIds.includes(id)), …controllableIds.filter(id => !preferredControlOrder.includes(id))];
const preferredNoCapOrder = [‘viagem_eua’,‘cartao_emprestado’,‘conforto_2025’,‘casamento’];
const orderedNoCap = […preferredNoCapOrder.filter(id => noCapIds.includes(id)), …noCapIds.filter(id => !preferredNoCapOrder.includes(id))];

<tfoot><tr style="background:#f1f5f9;font-weight:700"><td colspan="3" style="padding:8px 10px">Total em ${months[mi]}</td><td style="padding:8px 10px;text-align:right;color:#dc2626">R$ ${fmt(getMonthExp(m).reduce((s,e)=>s+e.val,0))}</td><td></td><td></td></tr></tfoot>
</table></div>`:`<div style="text-align:center;padding:32px;color:#94a3b8;font-size:12px">Nenhum gasto em ${months[mi]}. Estimativa: R$ ${fmt(getVarEstimate(m))}</div>`} <div class="alert alert-info" style="margin-top:12px"><strong>💡</strong> Gastos registrados substituem a estimativa de R$ ${fmt(getVarEstimate(m))} no Resumo.</div>`;
}

// ==================== CARTÃO ====================
function renderCartao() {
const m = state.trackMonth, mi = monthNums.indexOf(m);
const vc = getMonthCardBaseExp(m).filter(e => e.payment === ‘cartao’ && !e.isInst);
const tvc = vc.reduce((s,e)=>s+e.val,0);
const pm = getInstallmentCardItems(m).filter(e => e.payment === ‘cartao’);
const tp = pm.reduce((s,i)=>s+i.val,0);
const fc = getMonthFixedCardItems(m);
const tfc = fc.reduce((s,e)=>s+e.val,0);
const total = tvc + tp + tfc;
const activeCard = cards.some(c => c.id === state.cardSubTab) ? state.cardSubTab : cards[0].id;
const cardStyles = {nubank:{bg:’#fef3c7’,fg:’#d97706’},bradesco:{bg:’#ffe4e6’,fg:’#e11d48’},picpay:{bg:’#ecfccb’,fg:’#3f6212’}};
const activeMeta = cards.find(c => c.id === activeCard) || cards[0];
const activeStyle = cardStyles[activeCard] || {bg:’#f8fafc’,fg:’#334155’};
const activeVars = vc.filter(e => (e.card || ‘bradesco’) === activeCard);
const activeInst = pm.filter(e => (e.card || ‘bradesco’) === activeCard);
const activeFix = fc.filter(e => (e.card || ‘bradesco’) === activeCard);
const activeTotal = getMonthCardTotal(m, activeCard);
const activePaid = isCardPaid(m, activeCard);
return ` <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px"> <div class="stat-card" style="background:#fee2e2"><div style="font-size:10px;color:#dc2626;font-weight:600">TOTAL FATURA</div><div style="font-size:22px;font-weight:800;color:#dc2626">R$ ${fmt(total)}</div></div> <div class="stat-card" style="background:#fef3c7"><div style="font-size:10px;color:#d97706;font-weight:600">VARIÁVEIS</div><div style="font-size:18px;font-weight:700;color:#d97706">R$ ${fmt(tvc)}</div></div> <div class="stat-card" style="background:#ffe4e6"><div style="font-size:10px;color:#e11d48;font-weight:600">PARCELAS</div><div style="font-size:18px;font-weight:700;color:#e11d48">R$ ${fmt(tp)}</div></div> <div class="stat-card" style="background:#ecfeff"><div style="font-size:10px;color:#0e7490;font-weight:600">FIXAS NO CARTÃO</div><div style="font-size:18px;font-weight:700;color:#0e7490">R$ ${fmt(tfc)}</div></div> </div> ${(vc.length>0||pm.length>0||fc.length>0)?`
<div style="display:flex;gap:8px;overflow-x:auto;white-space:nowrap;margin:16px 0 8px;padding-bottom:2px">${cards.map(card=>`<button onclick="changeCardSubTab('${card.id}')" style="border:1px solid ${activeCard===card.id?'#2563eb':'#cbd5e1'};background:${activeCard===card.id?'#dbeafe':'#f1f5f9'};color:${activeCard===card.id?'#1d4ed8':'#475569'};font-weight:700;border-radius:10px;padding:8px 12px;cursor:pointer;flex:0 0 auto">${card.icon} ${card.id==='nubank'?'Nubank':card.id==='bradesco'?'Bradesco':'PicPay'}</button>`).join(’’)}</div>
<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin:0 0 8px">
<h4 style="color:#1e293b;margin:0">${activeMeta.icon} • Venc. dia ${getCardDueDay(activeCard)}</h4>
<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#334155;cursor:pointer;background:${activePaid?'#dcfce7':'#f8fafc'};border:1px solid #e2e8f0;border-radius:8px;padding:6px 8px"><input type=“checkbox” ${activePaid?‘checked’:’’} onchange=“toggleCardPaid(${m},’${activeCard}’)” style=“width:18px;height:18px;cursor:pointer;accent-color:#22c55e”><span>${activePaid?‘Paga’:‘Pendente’} • R$ ${fmt(activeTotal)}</span></label>
</div>
<div style="border-radius:10px;border:1px solid #e2e8f0;overflow:hidden"><table style="font-size:12px;width:100%"><thead><tr style="background:#1e293b;color:#fff"><th style="padding:8px 10px;text-align:left">Tipo</th><th style="padding:8px 10px;text-align:left">Descrição</th><th style="padding:8px 10px;text-align:right">Valor</th></tr></thead><tbody>
${activeFix.map((e,i)=>`<tr style="background:${i%2===0?'#fff':'#f8fafc'}"><td style="padding:7px 10px;font-size:11px">Fixa</td><td style="padding:7px 10px">${e.desc}</td><td style="padding:7px 10px;text-align:right;font-weight:600">R$ ${fmt(e.val)}</td></tr>`).join(’’)}
${activeVars.map((e,i)=>`<tr style="background:${(activeFix.length+i)%2===0?'#fff':'#f8fafc'}"><td style="padding:7px 10px;font-size:11px">Variável</td><td style="padding:7px 10px">${e.desc}</td><td style="padding:7px 10px;text-align:right;font-weight:600">R$ ${fmt(e.val)}</td></tr>`).join(’’)}
${activeInst.map((e,i)=>`<tr style="background:${(activeFix.length+activeVars.length+i)%2===0?'#fff':'#f8fafc'}"><td style="padding:7px 10px;font-size:11px">Parcela</td><td style="padding:7px 10px">${e.desc}</td><td style="padding:7px 10px;text-align:right;font-weight:600">R$ ${fmt(e.val)}</td></tr>`).join(’’)}
</tbody><tfoot><tr style="background:${activeStyle.bg};font-weight:700"><td colspan="2" style="padding:8px 10px">Subtotal</td><td style="padding:8px 10px;text-align:right;color:${activeStyle.fg}">R$ ${fmt(activeTotal)}</td></tr></tfoot></table></div>
`:''} <div class="alert alert-warning" style="margin-top:12px"><strong>💳 Fatura total:</strong> R$ ${fmt(total)}</div>`;
}

function exportData() {
const payload = buildPayload();
payload.exportedAt = new Date().toISOString();
const blob = new Blob([JSON.stringify(payload, null, 2)], {type: ‘application/json’});
const url = URL.createObjectURL(blob);
const a = document.createElement(‘a’);
a.href = url; a.download = `budget-2026-backup-${new Date().toISOString().slice(0,10)}.json`;
a.click(); URL.revokeObjectURL(url);
}

function importData(event) {
const file = event.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = function(e) {
try {
const d = JSON.parse(e.target.result);
if (d.expenses || d.fixedPaid || d.incomes) {
applyPayload(d);
saveData();
render();
alert(‘✅ Dados importados com sucesso!’);
} else {
alert(‘❌ Arquivo inválido’);
}
} catch(err) { alert(’❌ Erro ao ler arquivo: ’ + err.message); }
};
reader.readAsText(file);
event.target.value = ‘’;
}

loadData().then(() => render());
</script>

</body>
