function exportData() {
  const payload = {
    ...buildAppPayload(undefined),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `budget-2026-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function getCurrentBrtYear() {
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Sao_Paulo',
    year: 'numeric'
  }).format(new Date());
}
function getMonthFileLabel(mm) {
  const map = {
    1:'jan', 2:'fev', 3:'mar', 4:'abr', 5:'mai', 6:'jun',
    7:'jul', 8:'ago', 9:'set', 10:'out', 11:'nov', 12:'dez'
  };
  return map[mm] || String(mm).padStart(2, '0');
}
function filterObjectKeysByPrefix(obj, prefix) {
  return Object.fromEntries(
    Object.entries(obj || {}).filter(([key]) => String(key).startsWith(prefix))
  );
}
function buildMonthlyPayload(mm) {
  const month = parseInt(mm, 10);
  const weeklyItems = getConsWeeklySchedule().filter(item => item.month === month);
  const weeklyIds = new Set(weeklyItems.map(item => item.id));
  return {
    format: 'monthly-budget-v1',
    exportedAt: new Date().toISOString(),
    year: getCurrentBrtYear(),
    month,
    monthLabel: months[monthNums.indexOf(month)] || String(month),
    shared: {
      fixedOverrides: state.fixedOverrides,
      customInstallments: state.customInstallments,
      customFixed: state.customFixed,
      catOverrides: state.catOverrides,
      customVarCats: state.customVarCats,
      fixedCatOverrides: state.fixedCatOverrides,
      analyticsParentOverrides: state.analyticsParentOverrides,
      unifiedCatOverrides: state.unifiedCatOverrides,
      instCatOverrides: state.instCatOverrides,
      instOverrides: state.instOverrides,
      cardNames: state.cardNames,
      cardDueDay: state.cardDueDay,
      customCards: state.customCards,
      incomeRules: state.incomeRules
    },
    monthData: {
      expenses: [...(state.expenses?.[month] || [])],
      incomes: [...(state.incomes?.[month] || [])],
      fixedPaid: filterObjectKeysByPrefix(state.fixedPaid, `${month}-`),
      fixedActual: filterObjectKeysByPrefix(state.fixedActual, `${month}-`),
      varClosed: filterObjectKeysByPrefix(state.varClosed, `${month}-`),
      varMonthClosed: !!state.varMonthClosed?.[month],
      cardPaid: filterObjectKeysByPrefix(state.cardPaid, `${month}-`),
      consPaid: filterObjectKeysByPrefix(state.consPaid, `${month}-`),
      consWeeklyPaid: Object.fromEntries(
        Object.entries(state.consWeeklyPaid || {}).filter(([id, paid]) => weeklyIds.has(id) && paid)
      ),
      consMonthlyValue: parseFloat(state.consMonthlyByMonth?.[month]) || 0,
      consWeeklyScheduleData: weeklyItems,
      consReceiptsValue: parseFloat(state.consReceiptsByMonth?.[month]) || 0,
      subcategoryCapsByMonth: filterObjectKeysByPrefix(state.subcategoryCapsByMonth, `${month}-`),
      activityHistory: (state.activityHistory || []).filter(item => parseInt(item?.month, 10) === month)
    }
  };
}
function downloadJsonFile(payload, filename) {
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
function exportCurrentMonthData() {
  const month = state.trackMonth;
  const payload = buildMonthlyPayload(month);
  downloadJsonFile(payload, `budget-${payload.year}-${String(month).padStart(2, '0')}-${getMonthFileLabel(month)}.json`);
}
function exportAllMonthsData() {
  const year = getCurrentBrtYear();
  monthNums.forEach((month, idx) => {
    const payload = buildMonthlyPayload(month);
    setTimeout(() => {
      downloadJsonFile(payload, `budget-${year}-${String(month).padStart(2, '0')}-${getMonthFileLabel(month)}.json`);
    }, idx * 120);
  });
}
function mergeMonthScopedObject(target, prefix, values) {
  Object.keys(target || {}).forEach(key => {
    if (String(key).startsWith(prefix)) delete target[key];
  });
  Object.entries(values || {}).forEach(([key, value]) => {
    target[key] = value;
  });
}
function applyMonthlyPayload(d) {
  const month = parseInt(d?.month, 10);
  if (!monthNums.includes(month)) throw new Error('Mês inválido no arquivo mensal.');
  const shared = d.shared || {};
  const monthData = d.monthData || {};
  state.fixedOverrides = shared.fixedOverrides || state.fixedOverrides || {};
  state.customInstallments = (Array.isArray(shared.customInstallments) ? shared.customInstallments : (state.customInstallments || [])).map(ci => ({
    ...ci,
    card: ci.payment === "dinheiro" ? null : normalizeCardId(ci.card || inferCardFromText(ci.name))
  }));
  state.customFixed = (Array.isArray(shared.customFixed) ? shared.customFixed : (state.customFixed || [])).map(f => ({
    ...f,
    card: f.payment === "cartao" ? normalizeCardId(f.card || "bradesco") : null
  }));
  state.catOverrides = shared.catOverrides || state.catOverrides || {};
  state.customVarCats = Array.isArray(shared.customVarCats) ? shared.customVarCats : (state.customVarCats || []);
  state.fixedCatOverrides = shared.fixedCatOverrides || state.fixedCatOverrides || {};
  state.analyticsParentOverrides = shared.analyticsParentOverrides || state.analyticsParentOverrides || {};
  state.unifiedCatOverrides = shared.unifiedCatOverrides || state.unifiedCatOverrides || {};
  state.instCatOverrides = shared.instCatOverrides || state.instCatOverrides || {};
  state.instOverrides = shared.instOverrides || state.instOverrides || {};
  state.customCards = normalizeCustomCards(Array.isArray(shared.customCards) ? shared.customCards : (state.customCards || []));
  state.cardNames = normalizeLegacyCardNames({
    ...Object.fromEntries(getCards().map(card => [card.id, card.name])),
    ...(shared.cardNames || state.cardNames || {})
  });
  state.cardDueDay = {
    ...Object.fromEntries(getCards().map(card => [card.id, card.dueDay])),
    ...(shared.cardDueDay || state.cardDueDay || {})
  };
  for (const cardId of removedCardIds) {
    delete state.cardDueDay[cardId];
  }
  state.incomeRules = Array.isArray(shared.incomeRules) ? shared.incomeRules.map(normalizeIncomeRule) : getIncomeRules();
  state.expenses[month] = Array.isArray(monthData.expenses) ? monthData.expenses.map(e => {
    const payment = e.payment || "dinheiro";
    return {
      ...e,
      payment,
      card: payment === "cartao" ? normalizeCardId(e.card || inferCardFromText(e.desc)) : null
    };
  }) : [];
  state.incomes[month] = Array.isArray(monthData.incomes) ? monthData.incomes : [];
  mergeMonthScopedObject(state.fixedPaid, `${month}-`, monthData.fixedPaid || {});
  mergeMonthScopedObject(state.fixedActual, `${month}-`, monthData.fixedActual || {});
  mergeMonthScopedObject(state.varClosed, `${month}-`, monthData.varClosed || {});
  mergeMonthScopedObject(state.cardPaid, `${month}-`, monthData.cardPaid || {});
  for (const key of Object.keys(state.cardPaid)) {
    if (removedCardIds.has(String(key).split('-').slice(1).join('-'))) delete state.cardPaid[key];
  }
  mergeMonthScopedObject(state.consPaid, `${month}-`, monthData.consPaid || {});
  mergeMonthScopedObject(state.subcategoryCapsByMonth, `${month}-`, monthData.subcategoryCapsByMonth || {});
  if (monthData.varMonthClosed) state.varMonthClosed[month] = true;
  else delete state.varMonthClosed[month];
  const consMonthlyValue = parseFloat(monthData.consMonthlyValue) || 0;
  if (consMonthlyValue > 0) state.consMonthlyByMonth[month] = consMonthlyValue;
  else delete state.consMonthlyByMonth[month];
  const consReceiptsValue = parseFloat(monthData.consReceiptsValue) || 0;
  if (consReceiptsValue > 0) state.consReceiptsByMonth[month] = consReceiptsValue;
  else delete state.consReceiptsByMonth[month];
  const monthWeeklyItems = Array.isArray(monthData.consWeeklyScheduleData)
    ? monthData.consWeeklyScheduleData.map(normalizeConsWeeklyItem)
    : [];
  const monthWeeklyIds = new Set(monthWeeklyItems.map(item => item.id));
  state.consWeeklyScheduleData = [
    ...(state.consWeeklyScheduleData || []).filter(item => parseInt(item?.month, 10) !== month),
    ...monthWeeklyItems
  ];
  Object.keys(state.consWeeklyPaid || {}).forEach(id => {
    if (monthWeeklyIds.has(id)) delete state.consWeeklyPaid[id];
  });
  Object.entries(monthData.consWeeklyPaid || {}).forEach(([id, paid]) => {
    if (paid) state.consWeeklyPaid[id] = true;
  });
  state.activityHistory = [
    ...(state.activityHistory || []).filter(item => parseInt(item?.month, 10) !== month),
    ...((Array.isArray(monthData.activityHistory) ? monthData.activityHistory : []).map(item => ({
      ...item,
      month
    })))
  ].sort((a, b) => (Number(b?.ts) || 0) - (Number(a?.ts) || 0)).slice(0, 1000);
  state.trackMonth = month;
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const d = JSON.parse(e.target.result);
      const isMonthlyImport = !!(
        d
        && typeof d === 'object'
        && d.monthData
        && typeof d.monthData === 'object'
        && monthNums.includes(parseInt(d.month, 10))
      );
      if (isMonthlyImport) {
        applyMonthlyPayload(d);
        saveData();
        render();
        alert(`✅ ${d.monthLabel || fullMonthName(d.month)} importado com sucesso!`);
        return;
      }
      const looksLikeBackup = !!(
        d
        && typeof d === 'object'
        && (
          'expenses' in d
          || 'fixedPaid' in d
          || 'incomes' in d
          || 'fixedOverrides' in d
          || 'customInstallments' in d
          || 'customFixed' in d
          || 'consMonthlyByMonth' in d
          || 'incomeRules' in d
        )
      );
      if (!looksLikeBackup) {
        alert('❌ Arquivo inválido. Use um backup completo do app ou um JSON mensal exportado pelo novo formato.');
        return;
      }
      // Se o arquivo só tem expenses (arquivo de importação de faturas),
      // faz MERGE em vez de substituir para não perder dados existentes
      const isPartialImport = d.expenses && !d.fixedPaid && !d.incomes && !d.trackMonth;
      if (isPartialImport) {
        let added = 0;
        const existingIds = new Set(
          Object.values(state.expenses).flat().map(e => String(e.id))
        );
        for (const [month, items] of Object.entries(d.expenses)) {
          if (!Array.isArray(items)) continue;
          const m = parseInt(month, 10);
          if (!state.expenses[m]) state.expenses[m] = [];
          for (const item of items) {
            if (!existingIds.has(String(item.id))) {
              state.expenses[m].push(item);
              existingIds.add(String(item.id));
              added++;
            }
          }
        }
        saveData();
        render();
        alert(`✅ ${added} lançamentos importados com sucesso!`);
      } else {
        // Importação completa (backup) — substitui tudo
        applyPayload(d);
        saveData();
        render();
        alert('✅ Dados importados com sucesso!');
      }
    } catch(err) { alert('❌ Erro ao ler arquivo: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

loadData().then(() => {
  const syncedEntries = syncIncomeEntriesFromRules();
  if (syncedEntries) {
    // Salva só localmente no boot — não sobrescreve a nuvem com estado inicial
    if (storageOk) {
      try {
        const bootPayload = buildAppPayload();
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(bootPayload));
      } catch(e) {}
    }
    render();
    return;
  }
  render();
});
</script>
